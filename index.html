<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드 혜택 뷰어</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0d10;
  --panel:    #13131a;
  --surface:  #1c1c26;
  --border:   #2a2a38;
  --accent:   #7dd3b0;
  --accent2:  #7b8cde;
  --text:     #dde1f0;
  --muted:    #5a5a78;
  --high:     #7dd3b0;
  --mid:      #e0a44a;
  --low:      #5a5a78;
  --samsung:  #3b82f6;
  --shinhan:  #f43f5e;
}

body {
  font-family: 'Noto Sans KR', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── 헤더 ── */
header {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 14px 24px;
  background: var(--panel);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
header h1 { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
.badge {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--accent2);
  color: #fff;
  opacity: 0.8;
}
.tab-switcher {
  margin-left: auto;
  display: flex;
  gap: 2px;
  background: var(--surface);
  border-radius: 8px;
  padding: 3px;
}
.tab-btn {
  padding: 5px 14px;
  border-radius: 6px;
  border: none;
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 500;
  cursor: pointer;
  transition: all .15s;
}
.tab-btn.active { background: var(--accent2); color: #fff; }

/* ── 레이아웃 ── */
.layout { display: flex; flex: 1; overflow: hidden; }

/* ── 사이드바 ── */
aside {
  width: 210px;
  min-width: 210px;
  background: var(--panel);
  border-right: 1px solid var(--border);
  overflow-y: auto;
  padding: 12px 0;
}
.company-label {
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 1.8px;
  text-transform: uppercase;
  color: var(--muted);
  padding: 14px 16px 6px;
}
.card-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  padding: 8px 16px;
  background: none;
  border: none;
  border-left: 2px solid transparent;
  color: var(--muted);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  text-align: left;
  cursor: pointer;
  transition: all .12s;
}
.card-btn:hover { background: var(--surface); color: var(--text); }
.card-btn.active {
  border-left-color: var(--accent);
  background: var(--surface);
  color: var(--text);
  font-weight: 500;
}
.dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.dot.samsung { background: var(--samsung); }
.dot.shinhan  { background: var(--shinhan); }

/* ── 메인 ── */
main { flex: 1; overflow: auto; padding: 24px 28px; }

/* ── 비교 선택 패널 ── */
.compare-panel {
  display: none;
  flex-direction: column;
  gap: 16px;
}
.compare-panel.visible { display: flex; }

.compare-selectors {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.compare-slot {
  flex: 1;
  min-width: 200px;
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 16px;
}
.compare-slot label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 6px; }
.compare-slot select {
  width: 100%;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  padding: 6px 10px;
  border-radius: 6px;
  outline: none;
  cursor: pointer;
}
.compare-slot select:focus { border-color: var(--accent2); }

.compare-run-btn {
  align-self: flex-start;
  padding: 9px 22px;
  background: var(--accent2);
  color: #fff;
  border: none;
  border-radius: 8px;
  font-size: 13px;
  font-family: 'Noto Sans KR', sans-serif;
  font-weight: 600;
  cursor: pointer;
  transition: opacity .15s;
}
.compare-run-btn:hover { opacity: .85; }

/* ── 단일 카드 뷰 ── */
.card-view { display: none; flex-direction: column; gap: 20px; }
.card-view.visible { display: flex; }

.card-title-row {
  display: flex;
  align-items: center;
  gap: 12px;
}
.card-title-row h2 { font-size: 18px; font-weight: 700; }
.company-tag {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 4px;
  font-weight: 600;
}
.company-tag.samsung { background: rgba(59,130,246,.2); color: #93c5fd; }
.company-tag.shinhan { background: rgba(244,63,94,.2); color: #fda4af; }
.company-tag.hyundae { background: rgba(234,179,8,.2); color: #fde047; }
.dot.hyundae { background: #eab308; }


/* ── 필터바 ── */
.filter-bar {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  align-items: center;
}
.filter-bar input {
  flex: 1;
  min-width: 180px;
  padding: 7px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 7px;
  color: var(--text);
  font-size: 12px;
  font-family: 'Noto Sans KR', sans-serif;
  outline: none;
}
.filter-bar input:focus { border-color: var(--accent2); }
.filter-bar input::placeholder { color: var(--muted); }

.cat-pills { display: flex; gap: 6px; flex-wrap: wrap; }
.pill {
  padding: 4px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--muted);
  font-size: 11px;
  cursor: pointer;
  transition: all .12s;
  white-space: nowrap;
}
.pill:hover { border-color: var(--accent2); color: var(--text); }
.pill.active { border-color: var(--accent); background: rgba(125,211,176,.12); color: var(--accent); }

/* ── 테이블 ── */
.table-wrap {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
thead {
  background: var(--surface);
  position: sticky;
  top: 0;
  z-index: 1;
}
th {
  padding: 10px 14px;
  text-align: left;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: .8px;
  text-transform: uppercase;
  color: var(--muted);
  white-space: nowrap;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
th:hover { color: var(--text); }
th .sort-icon { margin-left: 4px; opacity: .4; }
th.sorted .sort-icon { opacity: 1; color: var(--accent); }

td {
  padding: 9px 14px;
  border-bottom: 1px solid rgba(255,255,255,.04);
  vertical-align: middle;
  color: var(--text);
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: rgba(255,255,255,.025); }

.cat-chip {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
  background: var(--surface);
  font-size: 10px;
  color: var(--muted);
  white-space: nowrap;
}

/* 실질할인율 배지 */
.rate-badge {
  display: inline-block;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 500;
  padding: 2px 8px;
  border-radius: 5px;
  white-space: nowrap;
}
.rate-high { background: rgba(125,211,176,.15); color: var(--high); }
.rate-mid  { background: rgba(224,164,74,.15);  color: var(--mid); }
.rate-low  { background: rgba(90,90,120,.15);   color: var(--low); }
.rate-none { color: var(--muted); font-family: 'DM Mono', monospace; font-size: 12px; }

.basis-tip {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  color: var(--muted);
}


/* 비교 테이블 카드 헤더 */
.compare-card-header {
  display: flex;
  gap: 0;
}
.compare-card-col {
  flex: 1;
  padding: 10px 14px;
  font-size: 12px;
  font-weight: 700;
  border-bottom: 1px solid var(--border);
  border-right: 1px solid var(--border);
}
.compare-card-col:last-child { border-right: none; }

/* ── 로딩 ── */
.loading {
  display: flex;
  align-items: center;
  justify-content: center;
  height: 200px;
  color: var(--muted);
  font-size: 13px;
  gap: 10px;
}
.spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center;
  padding: 60px;
  color: var(--muted);
  font-size: 13px;
}

/* ── 요약 카드 ── */
.summary-cards {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.summary-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 14px 18px;
  min-width: 120px;
  display: flex;
  flex-direction: column;
  gap: 6px;
  cursor: pointer;
  transition: border-color .15s;
}
.summary-card:hover { border-color: var(--accent2); }
.summary-card.active { border-color: var(--accent); background: rgba(125,211,176,.06); }
.summary-cat { font-size: 11px; color: var(--muted); }
.summary-rate {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
}
.summary-type { font-size: 10px; color: var(--muted); }

/* 스크롤바 */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>💳 카드 혜택 뷰어</h1>
  <span class="badge">benefit_engine</span>
  <div class="tab-switcher">
    <button class="tab-btn active" onclick="switchMode('single')">단일 카드</button>
    <button class="tab-btn"       onclick="switchMode('compare')">카드 비교</button>
  </div>
</header>

<div class="layout">

  <!-- 사이드바 -->
  <aside id="sidebar">
    <div class="loading"><div class="spinner"></div> 로딩 중</div>
  </aside>

  <!-- 메인 -->
  <main>

    <!-- 단일 카드 뷰 -->
    <div class="card-view" id="cardView">
      <div class="card-title-row">
        <h2 id="cardName">카드를 선택하세요</h2>
        <span class="company-tag" id="cardCompanyTag"></span>
      </div>

      <!-- 요약 카드 -->
      <div class="summary-cards" id="summaryCards"></div>
      <div class="filter-bar">
        <input type="text" id="searchInput" placeholder="혜택 내용 검색…" oninput="applyFilters()">
        <div class="cat-pills" id="catPills"></div>
      </div>

      <div class="table-wrap">
        <table id="benefitTable">
          <thead>
            <tr>
              <th onclick="sortBy('카테고리')">카테고리 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('혜택 종류')">혜택 종류 <span class="sort-icon">↕</span></th>
              <th>가맹점 / 혜택 내용</th>
              <th onclick="sortBy('할인율')">할인율 <span class="sort-icon">↕</span></th>
              <th onclick="sortBy('실질할인율(%)')">실질할인율 <span class="sort-icon">↕</span></th>
              <th>환산근거</th>
              <th>월 최대</th>
              <th>이용 조건</th>
              <th>서비스 내용</th>
              <th>원본 content</th>
            </tr>
          </thead>
          <tbody id="benefitBody">
            <tr><td colspan="8" class="empty">← 왼쪽에서 카드를 선택하세요</td></tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- 비교 뷰 -->
    <div class="compare-panel" id="comparePanel">
      <div class="compare-selectors">
        <div class="compare-slot">
          <label>카드 A</label>
          <select id="compareA"></select>
        </div>
        <div class="compare-slot">
          <label>카드 B</label>
          <select id="compareB"></select>
        </div>
      </div>
      <button class="compare-run-btn" onclick="runCompare()">비교하기</button>

      <div class="table-wrap" id="compareResult" style="display:none">
        <table id="compareTable">
          <thead id="compareHead"></thead>
          <tbody id="compareBody"></tbody>
        </table>
      </div>
    </div>

  </main>
</div>

<script>
// ── 상태 ──────────────────────────────────────────────
let allCards   = {};        // { samsung: [[id, name], …], shinhan: […] }
let rawData    = [];        // 현재 선택 카드의 원본 rows
let filtered   = [];        // 필터 적용 후 rows
let activeCats = new Set(); // 선택된 카테고리 필터
let sortCol    = null;
let sortAsc    = true;
let mode       = 'single';  // 'single' | 'compare'

// ── 초기화 ────────────────────────────────────────────
async function init() {
  const res = await fetch('/api/cards');
  allCards = await res.json();
  renderSidebar();
  renderCompareSelects();
}

function renderSidebar() {
  const aside = document.getElementById('sidebar');
  const labels = { samsung: '삼성카드', shinhan: '신한카드', hyundae: '현대카드' };
  aside.innerHTML = '';
  for (const [company, cards] of Object.entries(allCards)) {
    const lbl = document.createElement('div');
    lbl.className = 'company-label';
    lbl.textContent = labels[company] || company;
    aside.appendChild(lbl);

    for (const [id, name] of cards) {
      const btn = document.createElement('button');
      btn.className = 'card-btn';
      btn.dataset.company = company;
      btn.dataset.id = id;
      btn.innerHTML = `<span class="dot ${company}"></span>${name}`;
      btn.onclick = () => loadCard(company, id, name, btn);
      aside.appendChild(btn);
    }
  }
}

function renderCompareSelects() {
  ['compareA', 'compareB'].forEach(selId => {
    const sel = document.getElementById(selId);
    sel.innerHTML = '';
    for (const [company, cards] of Object.entries(allCards)) {
      const grp = document.createElement('optgroup');
      grp.label = company === 'samsung' ? '삼성카드' : '신한카드';
      for (const [id, name] of cards) {
        const opt = document.createElement('option');
        opt.value = `${company}:${id}`;
        opt.textContent = name;
        grp.appendChild(opt);
      }
      sel.appendChild(grp);
    }
  });
  // 기본값을 서로 다르게
  document.getElementById('compareB').selectedIndex = 1;
}

// ── 모드 전환 ─────────────────────────────────────────
function switchMode(m) {
  mode = m;
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (i === 0 && m === 'single') || (i === 1 && m === 'compare'));
  });
  document.getElementById('cardView').classList.toggle('visible', m === 'single');
  document.getElementById('comparePanel').classList.toggle('visible', m === 'compare');
}

// ── 단일 카드 로드 ────────────────────────────────────
async function loadCard(company, id, name, btn) {
  // 사이드바 활성화
  document.querySelectorAll('.card-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (mode !== 'single') switchMode('single');

  document.getElementById('cardName').textContent = name;
  const tag = document.getElementById('cardCompanyTag');
  const companyNames = { samsung: '삼성카드', shinhan: '신한카드', hyundae: '현대카드' };
  tag.textContent = companyNames[company] || company;
  tag.className = `company-tag ${company}`;

  document.getElementById('benefitBody').innerHTML =
    `<tr><td colspan="8" class="loading"><div class="spinner"></div> 불러오는 중…</td></tr>`;
  document.getElementById('catPills').innerHTML = '';
  activeCats.clear();
  sortCol = null;

   // 요약 카드 로드
  document.getElementById('summaryCards').innerHTML = '';
  const sumRes = await fetch(`/api/summary/${company}/${id}`);
  const sumData = await sumRes.json();
  renderSummaryCards(sumData);
  
  const res = await fetch(`/api/benefits/${company}/${id}`);
  rawData = await res.json();
  if (rawData.error) {
    document.getElementById('benefitBody').innerHTML =
      `<tr><td colspan="8" class="empty">⚠ ${rawData.error}</td></tr>`;
    return;
  }

  // 카테고리 추출 → 필터 pill 생성
  const cats = [...new Set(rawData.map(r => r['카테고리']))].sort();
  const pillBox = document.getElementById('catPills');
  cats.forEach(cat => {
    const p = document.createElement('button');
    p.className = 'pill';
    p.textContent = cat;
    p.onclick = () => toggleCat(cat, p);
    pillBox.appendChild(p);
  });

  applyFilters();
}

function toggleCat(cat, el) {
  if (activeCats.has(cat)) { activeCats.delete(cat); el.classList.remove('active'); }
  else                      { activeCats.add(cat);    el.classList.add('active'); }
  applyFilters();
}

// ── 필터 & 정렬 ───────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  filtered = rawData.filter(r => {
    const catOk  = activeCats.size === 0 || activeCats.has(r['카테고리']);
    const textOk = !q || Object.values(r).some(v => String(v).toLowerCase().includes(q));
    return catOk && textOk;
  });
  if (sortCol) applySort();
  else renderTable(filtered);
}

function sortBy(col) {
  if (sortCol === col) sortAsc = !sortAsc;
  else { sortCol = col; sortAsc = true; }
  document.querySelectorAll('th').forEach(th => {
    const isSorted = th.textContent.trim().startsWith(col) ||
                     (col === '실질할인율(%)' && th.textContent.includes('실질할인율'));
    th.classList.toggle('sorted', isSorted);
  });
  applySort();
}

function applySort() {
  filtered = [...filtered].sort((a, b) => {
    let av = a[sortCol] ?? '', bv = b[sortCol] ?? '';
    // 숫자 파싱 시도 (% 제거)
    const an = parseFloat(String(av).replace('%','').replace(',',''));
    const bn = parseFloat(String(bv).replace('%','').replace(',',''));
    if (!isNaN(an) && !isNaN(bn)) return sortAsc ? an - bn : bn - an;
    return sortAsc ? String(av).localeCompare(String(bv), 'ko')
                   : String(bv).localeCompare(String(av), 'ko');
  });
  renderTable(filtered);
}

// ── 테이블 렌더 ───────────────────────────────────────
function rateBadge(val) {
  if (!val || val === '-') return `<span class="rate-none">-</span>`;
  const n = parseFloat(val);
  const cls = n >= 3 ? 'rate-high' : n >= 1 ? 'rate-mid' : 'rate-low';
  return `<span class="rate-badge ${cls}">${val}</span>`;
}

function renderSummaryCards(rows) {
  const box = document.getElementById('summaryCards');
  if (!rows || rows.error || !rows.length) { box.innerHTML = ''; return; }
  box.innerHTML = rows.map(r => {
    const rate = r['실질할인율(%)'] ?? '-';
    const n = parseFloat(rate);
    const cls = n >= 3 ? 'rate-high' : n >= 1 ? 'rate-mid' : 'rate-low';
    return `
      <div class="summary-card" onclick="filterByCat('${r['카테고리']}')">
        <div class="summary-cat">${r['카테고리']}</div>
        <div class="summary-rate ${cls}">${rate}</div>
        <div class="summary-type">${r['혜택 종류'] ?? '-'}</div>
      </div>`;
  }).join('');
}

function filterByCat(cat) {
  activeCats.clear();
  document.querySelectorAll('.pill').forEach(p => {
    if (p.textContent === cat) { activeCats.add(cat); p.classList.add('active'); }
    else p.classList.remove('active');
  });
  applyFilters();
}

function renderTable(rows) {
  const tbody = document.getElementById('benefitBody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="8" class="empty">결과 없음</td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(r => `
    <tr>
      <td><span class="cat-chip">${r['카테고리'] ?? '-'}</span></td>
      <td>${r['혜택 종류'] || '-'}</td>
      <td>${r['적용 가맹점/혜택 내용'] ?? '-'}</td>
      <td style="font-family:'DM Mono',monospace;font-size:12px">${r['할인율'] ?? '-'}</td>
      <td>${rateBadge(r['실질할인율(%)'])}</td>
      <td><span class="basis-tip">${r['환산근거'] ?? '-'}</span></td>
      <td style="font-size:11px;color:var(--muted)">${r['월 최대'] ?? '-'}</td>
      <td style="font-size:11px;color:var(--muted)">${r['이용 조건'] ?? '-'}</td>
      <td style="font-size:11px;color:var(--accent)">${r['서비스 내용'] ?? ''}</td>
      <td style="font-size:10px;color:var(--muted)">${r['원본 content'] ?? ''}</td>
    </tr>`).join('');
}

function toggleDetail(i) {
  const row = document.getElementById('detail-' + i);
  if (!row) return;
  const open = row.style.display !== 'none';
  row.style.display = open ? 'none' : 'table-row';
  // 화살표 방향 전환
  const dataRows = document.querySelectorAll('.data-row');
  const arrow = dataRows[i] ? dataRows[i].querySelector('td:last-child') : null;
  // 단순 인덱스 대신 id로 매칭
  const allDetailRows = document.querySelectorAll('.detail-row');
  allDetailRows.forEach(dr => {
    if (dr.id === 'detail-' + i) {
      // arrow cell은 해당 data-row에서
    }
  });
}

// ── 카드 비교 ─────────────────────────────────────────
async function runCompare() {
  const a = document.getElementById('compareA').value;
  const b = document.getElementById('compareB').value;

  const resultBox = document.getElementById('compareResult');
  resultBox.style.display = 'block';
  document.getElementById('compareBody').innerHTML =
    `<tr><td colspan="4" class="loading"><div class="spinner"></div> 비교 중…</td></tr>`;

  const res  = await fetch(`/api/compare?card=${encodeURIComponent(a)}&card=${encodeURIComponent(b)}`);
  const data = await res.json();

  const [aKey, bKey] = [a, b];
  const aRows = data[aKey] || [];
  const bRows = data[bKey] || [];

  // 카드 이름 찾기
  function cardName(key) {
    const [company, id] = key.split(':');
    const found = (allCards[company] || []).find(([cid]) => cid === id);
    return found ? found[1] : id;
  }
  const aName = cardName(aKey);
  const bName = cardName(bKey);

  // 카테고리별 실질할인율 집계 (최대값)
  function maxRateByCategory(rows) {
    const map = {};
    rows.forEach(r => {
      const cat  = r['카테고리'];
      const rate = parseFloat(String(r['실질할인율(%)']).replace('%',''));
      if (!isNaN(rate)) {
        if (!(cat in map) || rate > map[cat].rate) {
          map[cat] = { rate, raw: r['실질할인율(%)'], basis: r['환산근거'] };
        }
      } else {
        if (!(cat in map)) map[cat] = { rate: -Infinity, raw: '-', basis: '-' };
      }
    });
    return map;
  }

  const aMap = maxRateByCategory(aRows);
  const bMap = maxRateByCategory(bRows);
  const cats = [...new Set([...Object.keys(aMap), ...Object.keys(bMap)])].sort();

  // 헤더
  document.getElementById('compareHead').innerHTML = `
    <tr>
      <th>카테고리</th>
      <th>${aName}</th>
      <th>${bName}</th>
      <th>우위</th>
    </tr>`;

  // 본문
  const rows = cats.map(cat => {
    const aVal = aMap[cat];
    const bVal = bMap[cat];
    const ar   = aVal?.rate ?? -Infinity;
    const br   = bVal?.rate ?? -Infinity;
    let winner = '–';
    if (ar > -Infinity || br > -Infinity) {
      if (ar > br)        winner = `<span style="color:var(--samsung)">▲ ${aName}</span>`;
      else if (br > ar)   winner = `<span style="color:var(--shinhan)">▲ ${bName}</span>`;
      else                winner = `<span style="color:var(--muted)">동일</span>`;
    }
    return `<tr>
      <td><span class="cat-chip">${cat}</span></td>
      <td>${rateBadge(aVal?.raw ?? '-')}<br><span class="basis-tip">${aVal?.basis ?? ''}</span></td>
      <td>${rateBadge(bVal?.raw ?? '-')}<br><span class="basis-tip">${bVal?.basis ?? ''}</span></td>
      <td>${winner}</td>
    </tr>`;
  }).join('');

  document.getElementById('compareBody').innerHTML = rows ||
    `<tr><td colspan="4" class="empty">비교할 데이터 없음</td></tr>`;
}

// ── 시작 ──────────────────────────────────────────────
init();
switchMode('single');
</script>
